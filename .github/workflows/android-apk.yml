name: Build APK Android (POC)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-poc
  cancel-in-progress: false

jobs:
  apk:
    name: Build APK Android (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: native-poc/package-lock.json

      - name: Install web dependencies
        working-directory: native-poc
        run: npm ci

      - name: Build web bundle
        working-directory: native-poc
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        working-directory: native-poc
        run: npx cap sync android

      - name: Restaurar keystore de assinatura (chave fixa p/ App Links)
        working-directory: native-poc/android
        run: |
          if [ -n "${{ secrets.CHECKAI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.CHECKAI_KEYSTORE_BASE64 }}" | base64 --decode > checkai.jks
            {
              echo "CHECKAI_KEYSTORE_PATH=$(pwd)/checkai.jks"
              echo "CHECKAI_KEYSTORE_PASSWORD=${{ secrets.CHECKAI_KEYSTORE_PASSWORD }}"
              echo "CHECKAI_KEY_ALIAS=${{ secrets.CHECKAI_KEY_ALIAS }}"
              echo "CHECKAI_KEY_PASSWORD=${{ secrets.CHECKAI_KEY_PASSWORD }}"
            } >> "$GITHUB_ENV"
            echo "Keystore fixa restaurada — APK assinado com ela."
          else
            echo "Sem CHECKAI_KEYSTORE_BASE64 — chave debug padrão (App Links não verificam)."
          fi

      - name: Build debug APK
        working-directory: native-poc/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Nomear APK com a versão
        id: ver
        working-directory: native-poc
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "android/app/build/outputs/apk/debug/check-ai-v${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: check-ai-apk
          path: native-poc/android/app/build/outputs/apk/debug/check-ai-v${{ steps.ver.outputs.version }}.apk
          if-no-files-found: error

      - name: Publicar APK em link público estável (Supabase)
        working-directory: native-poc
        run: |
          curl -fsS -X POST "${{ secrets.VITE_SUPABASE_URL }}/storage/v1/object/native-bundles/check-ai.apk" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-upsert: true" -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @android/app/build/outputs/apk/debug/check-ai-v${{ steps.ver.outputs.version }}.apk
          echo "APK publicado em /storage/v1/object/public/native-bundles/check-ai.apk"

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Check.AI APK (latest debug)
          body: |
            APK Android de debug gerado automaticamente pelo workflow.

            Versão: **v${{ steps.ver.outputs.version }}**

            Artefato:
            - `check-ai-v${{ steps.ver.outputs.version }}.apk`

            Observações:
            - Instalação apenas em Android
            - iPhone/iOS usa TestFlight ou App Store
          files: native-poc/android/app/build/outputs/apk/debug/check-ai-v${{ steps.ver.outputs.version }}.apk
          make_latest: true
