name: Build APK Android (POC)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-poc
  cancel-in-progress: false

jobs:
  apk:
    name: Build APK Android (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: native-poc/package-lock.json

      - name: Install web dependencies
        working-directory: native-poc
        run: npm ci

      - name: Build web bundle
        working-directory: native-poc
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        working-directory: native-poc
        run: npx cap sync android

      - name: Build debug APK
        working-directory: native-poc/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: check-ai-apk
          path: native-poc/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Check.AI APK (latest debug)
          body: |
            APK Android de debug gerado automaticamente pelo workflow.

            Artefato principal:
            - `app-debug.apk`

            Observações:
            - Instalação apenas em Android
            - iPhone/iOS usa TestFlight ou App Store
          files: native-poc/android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
