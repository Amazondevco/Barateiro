name: Gerar keystore (uma vez)

# Gera a keystore de assinatura ESTÁVEL do APK (necessária para Android App Links).
# Roda uma vez, sobe a keystore + senha como artefato (retenção curta) e imprime o
# SHA-256 (que é público e vai no assetlinks.json). Depois de configurar os secrets,
# este workflow é removido.
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gerar keystore
        run: |
          mkdir -p out
          PASS=$(openssl rand -hex 16)
          keytool -genkeypair -v -keystore out/checkai.jks -alias checkai \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Check.AI, OU=Mobile, O=Amazon Dev e Co, L=Manaus, ST=AM, C=BR"
          printf '%s' "$PASS" > out/pass.txt
          printf 'checkai' > out/alias.txt
          echo "===== SHA-256 (publico, vai no assetlinks.json) ====="
          keytool -list -v -keystore out/checkai.jks -storepass "$PASS" -alias checkai | grep -i "SHA256:"
          echo "===================================================="

      - name: Subir keystore como artefato
        uses: actions/upload-artifact@v4
        with:
          name: checkai-keystore
          path: out/
          retention-days: 1
